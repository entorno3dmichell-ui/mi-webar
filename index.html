<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi WebAR</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    .overlay {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.5);
      padding: 16px 20px;
      border-radius: 12px;
      max-width: 340px;
    }

    .overlay h1 {
      margin: 0 0 8px 0;
      font-size: 28px;
    }

    .overlay p {
      margin: 0;
      font-size: 15px;
      line-height: 1.4;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      background: #111;
    }
  </style>
</head>
<body>

  <div class="overlay">
    <h1>Mi WebAR</h1>
    <p>Toca el botón de AR para ver el modelo.</p>
  </div>

  <model-viewer
    src="modelo.glb"
    ios-src="modelo.usdz"
    alt="Modelo 3D en AR"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1"
    environment-image="neutral">
  </model-viewer>

</body>
</html>
