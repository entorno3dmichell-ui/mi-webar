<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>WebAR QR</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #000;
    }

    body {
      position: fixed;
      inset: 0;
    }

    /* Fuerza video/canvas AR a pantalla completa */
    video,
    canvas,
    .a-canvas,
    .arjs-video,
    .arjs-loader {
      position: fixed !important;
      inset: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
    }

    video,
    .arjs-video {
      object-fit: cover !important;
      z-index: 1 !important;
      background: #000 !important;
    }

    canvas,
    .a-canvas {
      z-index: 2 !important;
      pointer-events: none;
      background: transparent !important;
    }

    a-scene {
      position: fixed !important;
      inset: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      z-index: 2 !important;
    }

    /* Splash */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      pointer-events: none;
      background: transparent;
      opacity: 0;
      animation: splashAnim 3s ease forwards;
    }

    .logo-container {
      flex: 1;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      box-sizing: border-box;
    }

    #splash img {
      display: block;
      max-width: 65vw;
      max-height: 40vh;
      object-fit: contain;
      background: transparent;
    }

    .bottom-bar {
      width: 100%;
      height: 18vh;
      min-height: 90px;
      background: #d9d9d9;
      flex-shrink: 0;
    }

    @keyframes splashAnim {
      0%   { opacity: 0; }
      20%  { opacity: 1; }
      70%  { opacity: 1; }
      100% { opacity: 0; }
    }

    .hidden {
      display: none !important;
    }

    /* Mensaje opcional */
    #status {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10000;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
    }
  </style>
</head>
<body>

  <div id="splash">
    <div class="logo-container">
      <img src="logo.png" alt="Logo" />
    </div>
    <div class="bottom-bar"></div>
  </div>

  <div id="status">Apunta la cámara al QR</div>

  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="alpha: true; logarithmicDepthBuffer: true;"
    arjs="sourceType: webcam; trackingMethod: best; debugUIEnabled: false;"
  >
    <a-marker type="pattern" url="pattern-qr.patt">
      <a-entity
        gltf-model="modelo.glb"
        scale="0.3 0.3 0.3"
        position="0 0 0"
        rotation="0 0 0">
      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const splash = document.getElementById("splash");
    const status = document.getElementById("status");

    setTimeout(() => {
      splash.classList.add("hidden");
      status.style.display = "block";
    }, 3000);
  </script>

</body>
</html>
