<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WebAR QR</title>

<!-- AFRAME -->
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<!-- ARJS -->
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>

/* BASE */

html, body{
margin:0;
width:100%;
height:100%;
overflow:hidden;
font-family:Arial, sans-serif;
background:#ffffff;
}

/* SPLASH */

#splash{

position:fixed;
inset:0;
z-index:9999;

background:#ffffff;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

opacity:0;
animation:splashAnim 3s ease forwards;

}

/* LOGO */

.logo-container{

flex:1;
display:flex;
align-items:center;
justify-content:center;
width:100%;

padding:40px;
box-sizing:border-box;

}

#splash img{

max-width:65vw;
max-height:40vh;
object-fit:contain;

}

/* BANDA GRIS */

.bottom-bar{

width:100%;
height:18vh;
min-height:90px;
background:#d9d9d9;

}

/* ANIMACION */

@keyframes splashAnim{

0%{opacity:0;}
20%{opacity:1;}
70%{opacity:1;}
100%{
opacity:0;
visibility:hidden;
}

}

/* ESCENA */

a-scene{
width:100%;
height:100%;
}

</style>

</head>



<body>



<!-- SPLASH -->

<div id="splash">

<div class="logo-container">
<img src="logo.png">
</div>

<div class="bottom-bar"></div>

</div>



<!-- ESCENA AR -->

<a-scene
embedded
vr-mode-ui="enabled:false"
renderer="logarithmicDepthBuffer:true;"
arjs="sourceType:webcam; trackingMethod:best; debugUIEnabled:false;">



<!-- MARKER QR -->

<a-marker type="pattern" url="pattern-qr.patt">



<a-entity
gltf-model="modelo.glb"
scale="0.3 0.3 0.3"
position="0 0 0"
rotation="0 0 0">
</a-entity>



</a-marker>



<a-entity camera></a-entity>



</a-scene>



<script>

const splash = document.getElementById("splash")

setTimeout(()=>{
splash.style.display="none"
},3000)

</script>



</body>
</html>
