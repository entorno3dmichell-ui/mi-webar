<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi WebAR</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    /* SPLASH */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: transparent;
      opacity: 0;
      animation: splashAnim 3s ease forwards;
      pointer-events: none;
    }

    .logo-container {
      flex: 1;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      box-sizing: border-box;
    }

    #splash img {
      display: block;
      max-width: 65vw;
      max-height: 40vh;
      object-fit: contain;
      background: transparent;
    }

    .bottom-bar {
      width: 100%;
      height: 18vh;
      min-height: 90px;
      background: #d9d9d9;
      flex-shrink: 0;
    }

    @keyframes splashAnim {
      0%   { opacity: 0; }
      20%  { opacity: 1; }
      70%  { opacity: 1; }
      100% { opacity: 0; }
    }

    .hidden {
      display: none !important;
    }

    /* CONTENIDO */
    .overlay {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 30;
      background: rgba(0, 0, 0, 0.55);
      padding: 16px 20px;
      border-radius: 12px;
      max-width: 320px;
    }

    .overlay h1 {
      margin: 0 0 8px 0;
      font-size: 28px;
    }

    .overlay p {
      margin: 0;
      font-size: 15px;
      line-height: 1.4;
    }

    model-viewer {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #222;
    }

    .ar-button {
      background: white;
      color: black;
      border-radius: 10px;
      border: none;
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 22px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      z-index: 40;
    }

    .ios-fallback {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 40;
      background: #0a84ff;
      color: white;
      text-decoration: none;
      padding: 12px 18px;
      border-radius: 10px;
      font-weight: bold;
      display: none;
    }

    .note {
      position: absolute;
      bottom: 130px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 40;
      background: rgba(0, 0, 0, 0.6);
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
    }
  </style>
</head>
<body>

  <!-- SPLASH -->
  <div id="splash">
    <div class="logo-container">
      <img src="logo.png" alt="Logo" />
    </div>
    <div class="bottom-bar"></div>
  </div>

  <!-- TEXTO -->
  <div class="overlay">
    <h1>Mi WebAR</h1>
    <p>Toca el botón para ver el modelo en AR de superficie.</p>
  </div>

  <!-- MENSAJE / FALLBACK iPHONE -->
  <div id="note" class="note">Si estás en iPhone, usa el botón azul.</div>

  <a id="iosFallback" class="ios-fallback" rel="ar" href="./modelo.usdz">
    Abrir AR en iPhone
  </a>

  <!-- VISOR -->
  <model-viewer
    id="viewer"
    src="./modelo.glb"
    ios-src="./modelo.usdz"
    alt="Modelo 3D"
    ar
    ar-modes="quick-look scene-viewer webxr"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1.4"
    environment-image="neutral"
    camera-orbit="45deg 70deg 2m"
    min-camera-orbit="auto auto 0.5m"
    max-camera-orbit="auto auto 10m"
    field-of-view="30deg"
    interaction-prompt="auto">

    <button class="ar-button" slot="ar-button">
      Ver en AR
    </button>
  </model-viewer>

  <script>
    const splash = document.getElementById("splash");
    const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
    const fallback = document.getElementById("iosFallback");
    const note = document.getElementById("note");
    const viewer = document.getElementById("viewer");

    setTimeout(() => {
      splash.classList.add("hidden");
    }, 3000);

    if (isIOS) {
      fallback.style.display = "block";
      note.style.display = "block";
    }

    viewer.addEventListener("load", () => {
      console.log("Modelo cargado correctamente");
    });

    viewer.addEventListener("error", (event) => {
      console.error("Error cargando el modelo:", event);
    });
  </script>

</body>
</html>
