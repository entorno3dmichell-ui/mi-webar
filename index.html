<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi WebAR</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    .overlay {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 20;
      background: rgba(0, 0, 0, 0.5);
      padding: 16px 20px;
      border-radius: 12px;
      max-width: 320px;
    }

    .overlay h1 {
      margin: 0 0 8px 0;
      font-size: 28px;
    }

    .overlay p {
      margin: 0;
      font-size: 15px;
      line-height: 1.4;
    }

    model-viewer {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #222;
    }

    .ar-button {
      background: white;
      border-radius: 8px;
      border: none;
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 20px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="overlay">
    <h1>Mi WebAR</h1>
    <p>Toca el botón para ver el modelo en AR.</p>
  </div>

  <model-viewer
    src="./modelo.glb"
    ios-src="./modelo.usdz"
    alt="Modelo 3D"
    ar
    ar-modes="quick-look scene-viewer webxr"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1"
    environment-image="neutral">

    <button class="ar-button" slot="ar-button">
      Ver en AR
    </button>

  </model-viewer>

</body>
</html>
