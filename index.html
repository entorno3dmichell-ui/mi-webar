<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Página con Splash Screen Eliminado</title>
  <style>
    /* Fondo general */
    html, body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      overflow: hidden;
      height: 100%;
      width: 100%;
    }

    /* Splash screen (sin franja gris, sin animación de entrada) */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: transparent;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    /* Logo (con fallback si no carga) */
    #splash img {
      max-width: 100%;
      max-height: 100px;
      opacity: 0.9;
    }

    /* Botón AR (en el centro o en la parte inferior) */
    .ar-button {
      margin-top: 20px;
      padding: 16px 32px;
      font-size: 18px;
      background: #007BFF;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s ease;
    }

    .ar-button:hover {
      background: #0056b3;
    }

    /* Responsividad para móviles */
    @media (max-width: 480px) {
      .ar-button {
        padding: 12px 24px;
        font-size: 16px;
      }
    }

    /* Opcional: estilo para el fondo gris que no se ve al inicio */
    .hidden {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- Splash screen inicial (sin fondo gris, se oculta después de 3 segundos) -->
  <div id="splash">
    <img src="logo.png" alt="Logo" onerror="this.src='logo-placeholder.png'; this.onerror=null;">
    <!-- Botón opcional (si quieres que aparezca en el splash) -->
    <button class="ar-button" onclick="window.location.href='modelo.usdz'">Abrir en AR</button>
  </div>

  <!-- Contenido principal (aparece después de que el splash se oculta) -->
  <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; color: white;">
    ¡Bienvenido! El modelo se cargará aquí.
  </div>

  <script>
    // Oculta el splash screen después de 3 segundos
    setTimeout(() => {
      const splash = document.getElementById('splash');
      splash.style.opacity = "0";
      splash.classList.add('hidden');
    }, 3000);

    // Opcional: si quieres que el botón de AR funcione bien en móvil
    document.querySelectorAll('.ar-button').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        // Puedes abrir el modelo en AR o redirigir
        window.open('modelo.usdz', '_blank');
      });
    });
  </script>

</body>
</html>
