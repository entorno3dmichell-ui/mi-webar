<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebAR QR</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #000;
    }

    a-scene {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* SPLASH */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      pointer-events: none;

      /* importante: sin fondo blanco */
      background: transparent;

      opacity: 0;
      animation: splashAnim 3s ease forwards;
    }

    .logo-container {
      flex: 1;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      box-sizing: border-box;
    }

    #splash img {
      display: block;
      max-width: 65vw;
      max-height: 40vh;
      object-fit: contain;
      background: transparent;
    }

    .bottom-bar {
      width: 100%;
      height: 18vh;
      min-height: 90px;
      background: #d9d9d9;
      flex-shrink: 0;
    }

    @keyframes splashAnim {
      0%   { opacity: 0; }
      20%  { opacity: 1; }
      70%  { opacity: 1; }
      100% { opacity: 0; }
    }

    .splash-hidden {
      opacity: 0 !important;
      visibility: hidden !important;
      display: none !important;
    }
  </style>
</head>
<body>

  <!-- SPLASH -->
  <div id="splash">
    <div class="logo-container">
      <img src="logo.png" alt="Logo" />
    </div>
    <div class="bottom-bar"></div>
  </div>

  <!-- ESCENA AR -->
  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; alpha: true;"
    arjs="sourceType: webcam; trackingMethod: best; debugUIEnabled: false;"
  >
    <a-marker type="pattern" url="pattern-qr.patt">
      <a-entity
        gltf-model="modelo.glb"
        scale="0.3 0.3 0.3"
        position="0 0 0"
        rotation="0 0 0">
      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const splash = document.getElementById("splash");

    setTimeout(() => {
      splash.classList.add("splash-hidden");
    }, 3000);
  </script>

</body>
</html>
